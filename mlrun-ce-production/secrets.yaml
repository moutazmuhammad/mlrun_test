# =============================================================================
# MLRun CE - Required Secrets Template
#
# BEFORE APPLYING:
#   1. Replace all "REPLACE_*" placeholders with real values (see WHERE TO GET
#      below for each secret)
#   2. Ensure the aib-system namespace exists:
#        kubectl create namespace aib-system
#   3. Apply all secrets at once:
#        kubectl apply -f secrets.yaml
#   4. Verify:
#        kubectl get secrets -n aib-system
#
# SECURITY:
#   - This file contains CREDENTIALS - do NOT commit it to git as-is
#   - Add to .gitignore:
#        echo "mlrun-ce-production/secrets.yaml" >> .gitignore
#   - For GitOps, use a Sealed Secret / External Secrets Operator / Vault instead
#
# See SECRETS.md for full details on each secret's purpose and consumers.
# =============================================================================


# -----------------------------------------------------------------------------
# Secret 1: minio-credentials
#
# PURPOSE:  S3-compatible credentials for MLRun API, Jupyter, and MLRun job
#           pods to read/write artifacts, feature store data, model files.
#
# CONSUMED BY:
#   - Deployment: mlrun-api-chief (via envFrom.secretRef)
#   - Deployment: mlrun-api-worker (via envFrom.secretRef)
#   - Deployment: mlrun-jupyter (via envFrom.secretRef)
#   - All MLRun job pods (via MLRUN_STORAGE__AUTO_MOUNT_PARAMS)
#
# WHERE TO GET THE VALUES:
#   The values MUST match the access credentials of the S3-compatible object
#   store running in the aib-data namespace.
#
#   If using MinIO:
#     - AWS_ACCESS_KEY_ID     <- MinIO rootUser (from minio-values.yaml)
#     - AWS_SECRET_ACCESS_KEY <- MinIO rootPassword (from minio-values.yaml)
#     Retrieve from an existing MinIO deployment:
#       kubectl get secret minio -n aib-data -o jsonpath='{.data.rootUser}' | base64 -d
#       kubectl get secret minio -n aib-data -o jsonpath='{.data.rootPassword}' | base64 -d
#
#   If using AI Store / another S3-compatible store:
#     - AWS_ACCESS_KEY_ID     <- The store's access key / username
#     - AWS_SECRET_ACCESS_KEY <- The store's secret key / password
#     Check the store's documentation or the Secret/ConfigMap created by its
#     Helm chart in the aib-data namespace.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: aib-system
  labels:
    app.kubernetes.io/part-of: mlrun-ce
    app.kubernetes.io/component: object-store-credentials
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_S3_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_S3_SECRET_KEY"

---

# -----------------------------------------------------------------------------
# Secret 2: mlpipeline-minio-artifact
#
# PURPOSE:  S3-compatible credentials for Kubeflow Pipelines components
#           to store pipeline artifacts, workflow logs, and ML metadata.
#
# NOTE:     The key names are `accesskey`/`secretkey` (lowercase, no underscores)
#           because Kubeflow Pipelines templates hardcode these exact names.
#           The values must be the same as minio-credentials above.
#
# CONSUMED BY:
#   - Deployment: ml-pipeline (API server) - env: OBJECTSTORECONFIG_ACCESSKEY/SECRETACCESSKEY
#   - Deployment: ml-pipeline-ui - env: MINIO_ACCESS_KEY/MINIO_SECRET_KEY
#   - Deployment: workflow-controller - Argo artifact repository config
#   - Viewer CRD pods (TensorBoard, etc.) - AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY
#
# WHERE TO GET THE VALUES:
#   Use the SAME values as minio-credentials above. They point to the same
#   S3-compatible object store.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mlpipeline-minio-artifact
  namespace: aib-system
  labels:
    app.kubernetes.io/part-of: mlrun-ce
    app.kubernetes.io/component: pipelines-object-store
    application-crd-id: kubeflow-pipelines
type: Opaque
stringData:
  accesskey: "REPLACE_WITH_S3_ACCESS_KEY"
  secretkey: "REPLACE_WITH_S3_SECRET_KEY"

---

# =============================================================================
# Secret 3: registry-credentials (OPTIONAL - only for pull-secret auth)
#
# Only create this secret if you are NOT using cloud-native identity for the
# container registry (GKE Workload Identity / AWS IRSA / Azure AD Workload
# Identity / OpenShift internal registry).
#
# If you ARE using cloud-native identity, DELETE this entire section and keep
# `global.registry.secretName: ""` in values.yaml.
#
# PURPOSE:  Authenticate to the container registry for pushing function images
#           (Nuclio Dashboard) and pulling them (function pods).
#
# CONSUMED BY:
#   - Deployment: nuclio-dashboard (aib-system) - pushes built images
#   - Deployment: mlrun-api (aib-system) - MLRUN_HTTPDB__BUILDER__DOCKER_REGISTRY_SECRET
#   - Function pods in aib-serving - imagePullSecret on deployments
#
# WHERE TO GET THE VALUES:
#   Depends on your registry:
#
#   Docker Hub:
#     server:   https://index.docker.io/v1/
#     username: your Docker Hub username
#     password: your Docker Hub password (or access token - recommended)
#
#   GHCR (GitHub Container Registry):
#     server:   ghcr.io
#     username: your GitHub username
#     password: a Personal Access Token with read:packages + write:packages
#
#   Harbor:
#     server:   your Harbor FQDN (e.g. harbor.example.com)
#     username: a Harbor robot account or user with push/pull
#     password: the account's password or access token
#
#   Private on-prem registry:
#     server:   the registry URL
#     username: registry user
#     password: registry password
#
# CREATE VIA KUBECTL (easier than writing the dockerconfigjson manually):
#
#   for NS in aib-system aib-serving; do
#     kubectl create secret docker-registry registry-credentials \
#       --docker-server=REPLACE_WITH_REGISTRY_URL \
#       --docker-username=REPLACE_WITH_USERNAME \
#       --docker-password=REPLACE_WITH_PASSWORD \
#       --namespace "$NS"
#   done
#
# Or apply via YAML below (you must base64-encode the dockerconfigjson yourself):
#
#   echo -n '{"auths":{"REGISTRY_URL":{"username":"USER","password":"PASS","auth":"BASE64(USER:PASS)"}}}' | base64 -w0
# =============================================================================

