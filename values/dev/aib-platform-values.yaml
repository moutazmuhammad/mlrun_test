      #   pathPrefix: /api
      #   timeout: 10s
      #   retries:
      #     attempts: 3
      #     perTryTimeout: 2s
      #     retryOn: 5xx

      - name: mlrun-ui
        subdomain: mlrun
        serviceNamespace: aib-system
        port: 80
        timeout: 30s

      - name: jupyter
        subdomain: jupyter
        serviceNamespace: aib-system
        port: 8888
        timeout: 60s

      - name: nuclio
        subdomain: nuclio
        serviceNamespace: aib-system
        port: 8070
        timeout: 30s

      - name: ml-pipeline-ui
        subdomain: pipelines
        serviceNamespace: aib-system
        port: 80

