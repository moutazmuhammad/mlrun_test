# We use global values scope to multiplex the docker-registry details to both mlrun and nuclio
global:
  # External host/ip to reach the k8s node. This might take various values if k8s is run in a VM or a cloud env
  externalHostAddress: localhost
  registry:
    url: mustprovide
    secretName:
  nuclio:
    dashboard:
      nodePort: 30050
  infrastructure:
    # Defines infra flavour, for instance: standalone, onprem, aws, azure, gcp...
    kind: standalone
    # Defines k8s flavour, for instance: eks, aks, gcp, kubespray, openshift, rancher, minikube...
    provider: ~
    inboundCidrs: ~
    loadBalancerName: ~
    aws:
      bucketName: ~
      s3NonAnonymous: false
      domainNameCertificate: ~

nuclio:
  # coupled with mlrun.nuclio.dashboardName template in mlrun chart
  fullnameOverride: nuclio
  controller:
    enabled: true
  dashboard:
    enabled: true
    # nodePort - taken from global.nuclio.dashboard.nodePort for re-usability

    # k8s has deprecated docker support since v1.20
    containerBuilderKind: kaniko
    ingress:
      enabled: false

    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
  autoscaler:
    enabled: false
  dlx:
    enabled: false
  rbac:
    create: true

    # do not allow nuclio to listen on all namespaces
    crdAccessMode: namespaced
  crd:
    create: true
  platform:
    logger:
      sinks:
        myStdoutLoggerSink:
          kind: stdout
          attributes:
            encoding: console
            timeFieldName: time
            timeFieldEncoding: iso8601
      system:
        - level: debug
          sink: myStdoutLoggerSink
      functions:
        - level: debug
          sink: myStdoutLoggerSink
    projectsLeader:
      kind: mlrun
      synchronizationInterval: 10m
      apiAddress: http://mlrun-api-chief:8080/api

mlrun:
  # set the type of filesystem to use: filesystem, s3
  enabled: true
  defaultFunctionPodResources:
    limits:
      cpu: "2"
      memory: "20Gi"
    requests:
      cpu: "25m"
      memory: "1Mi"
  storage: filesystem
  storageAutoMountParams: ~
  secrets:
    s3:
      accessKey: ""
      secretKey: ""
  s3:
    region: us-east-1
    regionEndpoint: s3.us-east-1.amazonaws.com
    bucket: mlrun
    encrypt: false
    secure: true
  fullnameOverride: mlrun
  nuclio:
    mode: enabled
  rbac:
    create: true
  v3io:
    enabled: false
  api:
    ingress:
      enabled: false
      annotations: {}
    sidecars:
      logCollector:
        enabled: true
    fullnameOverride: mlrun-api
    functionSpecServiceAccountDefault: ~
    service:
      type: NodePort
      nodePort: 30070
    volumes:
      storageOverride:
        persistentVolumeClaim:
          claimName: mlrun-api-pvc
    persistence:
      enabled: true
      existingClaim:
      storageClass:
      accessMode: "ReadWriteOnce"
      size: "8Gi"
      annotations:
        helm.sh/resource-policy: "keep"
    envFrom:
      - configMapRef:
          name: mlrun-common-env
      - configMapRef:
          name: mlrun-pipelines-config
          optional: true
      - configMapRef:
          name: mlrun-spark-config
          optional: true
      - configMapRef:
          name: mlrun-override-env
          optional: true
    extraPersistentVolumeMounts: ~
  ui:
    fullnameOverride: mlrun-ui
    ingress:
      enabled: false
    service:
      type: NodePort
      nodePort: 30060
  db:
    name: db
    fullnameOverride: mlrun-db
    securityContext:
      runAsUser: 999
    podSecurityContext:
      runAsUser: 999
      fsGroup: 999
    volumes:
      storageOverride:
        persistentVolumeClaim:
          claimName: mlrun-db-pvc
    persistence:
      enabled: true
      existingClaim:
      storageClass:
      accessMode: "ReadWriteOnce"
      size: "8Gi"
      annotations:
        helm.sh/resource-policy: "keep"

  httpDB:
    dbType: mysql
    dirPath: "/mlrun/db"
    dsn: mysql+pymysql://root@mlrun-db:3306/mlrun
    oldDsn: sqlite:////mlrun/db/mlrun.db?check_same_thread=false
  modelMonitoring:
    # If no dsn has been provided, will initiate monitoring database under mlrun-db service:
    # mysql+pymysql://root@mlrun-db:3306/mlrun_model_monitoring
    dsn:
  ce:
    mode: full

jupyterNotebook:
  serviceAccount:
    create: true
    name: mlrun-jupyter
  awsInstall: false
  fullnameOverride: mlrun-jupyter
  name: jupyter-notebook
  enabled: true
  service:
    type: NodePort
    nodePort: 30040
    port: 8888
  ingress:
    enabled: false
    annotations: {}
    ingressClassName: ""

    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    hosts:
      - host: chart-example.local
        paths: []
    tls: []

    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local
  image:
    repository: quay.io/mlrun/jupyter
    tag: 1.10.0
    pullPolicy: IfNotPresent
    pullSecrets: []
  busybox:
    image: busybox
    tag: 1.37
  ce:
    mode: full

  # use this to override mlrunUIURL, by default it will be auto-resolved to externalHostAddress and
  # mlrun UI node port
  mlrunUIURL:
  extraEnvKeyValue: {}
  envFrom:
    - configMapRef:
        name: jupyter-common-env
        optional: true
  persistence:
    enabled: true
    existingClaim:
    storageClass:
    accessMode: "ReadWriteOnce"
    size: "8Gi"
    annotations:
      helm.sh/resource-policy: "keep"

  nodeSelector:
    {}
    # node-role.kubernetes.io/node: "true"
    # tier: cs
  tolerations:
    []
    #  - key: "node-role.kubernetes.io/master"
    #    effect: NoSchedule

mpi-operator:
  fullnameOverride: mpi-operator
  crd:
    create: true
  rbac:
    clusterResources:
      create: true
    namespaced:
      create: true
  deployment:
    create: true

minio:
  enabled: true
  rootUser: minio
  rootPassword: minio123
  ingress:
    enabled: false
  mode: standalone
  replicas: 1
  resources:
    requests:
      memory: 0.5Gi
  service:
    type: NodePort
    port: 9000
    nodePort: 30080
  consoleService:
    type: NodePort
    port: 9001
    nodePort: 30090
  persistence:
    enabled: true
    size: 1Gi
  fullnameOverride: minio
  buckets:
    - name: mlrun
      policy: none
      purge: false

spark-operator:
  enabled: true
  fullnameOverride: spark-operator
  controller:
    serviceName: spark-operator-webhook
  webhook:
    enable: true
  spark:
    # User should set this value accordingly when installing in another namespace
    jobNamespaces:
      - mlrun
    serviceAccount:
      name: sparkapp

pipelines:
  enabled: true
  name: pipelines
  ui:
    enabled: false
  service:
    type: NodePort
    nodePort: 30100
  crd:
    enabled: true
  priority_class:
    enabled: true
  persistence:
    enabled: true
    existingClaim:
    storageClass:
    accessMode: "ReadWriteOnce"
    size: "20Gi"
    annotations:
      helm.sh/resource-policy: "keep"
  nodeSelector:
    {}
    # node-role.kubernetes.io/node: "true"
    # tier: cs
  tolerations:
    []
    #  - key: "node-role.kubernetes.io/master"
    #    effect: NoSchedule
  db:
    username: root
    securityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      fsGroupChangePolicy: OnRootMismatch
  minio:
    enabled: true
    accessKey: "minio"
    secretKey: "minio123"
    endpointPort: "9000"
    bucket: "mlrun"
  images:
    driver:
      repository: ghcr.io/kubeflow/kfp-driver
      tag: 2.14.3
    launcher:
      repository: ghcr.io/kubeflow/kfp-launcher
      tag: 2.14.3
    argoexec:
      repository: gcr.io/iguazio/argoexec
      tag: v3.4.17-license-compliance
    workflowController:
      repository: gcr.io/iguazio/workflow-controller
      tag: v3.4.17-license-compliance
    apiServer:
      repository: ghcr.io/kubeflow/kfp-api-server
      tag: 2.14.3
    persistenceagent:
      repository: ghcr.io/kubeflow/kfp-persistence-agent
      tag: 2.14.3
    scheduledworkflow:
      repository: ghcr.io/kubeflow/kfp-scheduled-workflow-controller
      tag: 2.14.3
    ui:
      repository: ghcr.io/kubeflow/kfp-frontend
      tag: 2.14.3
    viewerCrdController:
      repository: ghcr.io/kubeflow/kfp-viewer-crd-controller
      tag: 2.14.3
    visualizationServer:
      repository: ghcr.io/kubeflow/kfp-visualization-server
      tag: 2.14.3
    metadata:
      container:
        repository: gcr.io/tfx-oss-public/ml_metadata_store_server
        tag: 1.16.0
    metadataEnvoy:
      repository: ghcr.io/kubeflow/kfp-metadata-envoy
      tag: 2.14.3
    metadataWriter:
      repository: ghcr.io/kubeflow/kfp-metadata-writer
      tag: 2.14.3
    mysql:
      # MySQL 8.0.26 because >= 8.0.27 has deprecated the default_authentication_plugin option
      # which is required by MLMD workloads (metadata-grpc-deployment and metadata-writer).
      # https://dev.mysql.com/doc/refman/8.0/en/server-system-variables.html#sysvar_default_authentication_plugin
      repository: gcr.io/iguazio/mysql
      tag: "8.0.26"
    cacheImage:
      repository: gcr.io/google-containers/busybox
      tag: latest
    minio:
      repository: minio/minio
      tag: "RELEASE.2025-10-15T17-29-55Z"


kube-prometheus-stack:
  fullnameOverride: monitoring
  enabled: true
  prometheusOperator:
    tls:
      enabled: false
    admissionWebhooks:
      enabled: false
  alertmanager:
    enabled: false
  grafana:
    adminUser: admin
    adminPassword: admin
    initChownData:
      enabled: false
    additionalDataSources:
      - name: iguazio
        type: mysql
        url: mlrun-db:3306
        user: root
        password:
        database: mlrun_model_monitoring
        editable: true
        maxOpenConns: 100
        maxIdleConns: 100
        maxIdleConnsAuto: true
    persistence:
      type: pvc
      enabled: true
      size: 10Gi
    grafana.ini:
      auth.anonymous:
        enabled: true
        org_role: Editor
    fullnameOverride: grafana
    enabled: true
    service:
      type: NodePort
      nodePort: 30010
    ingress:
      enabled: false
  prometheus:
    enabled: true
    service:
      type: NodePort
      nodePort: 30020
  kube-state-metrics:
    fullnameOverride: state-metrics
prometheus-node-exporter:
  fullnameOverride: node-exporter
  hostNetwork: false
  service:
    port: 9100
  hostRootFsMount:
    enabled: false

tdengine:
  enabled: true
  fullnameOverride: tdengine-tsdb
  # For more detailes
  # https://github.com/taosdata/TDengine-Operator/blob/3.0/helm/tdengine/values.yaml
  replicaCount: 1
  image:
    prefix: tdengine/tdengine
    pullPolicy: Always
    tag: "3.0.7.1"
  service:
    type: ClusterIP
    ports:
      tcp: [6030, 6041, 6042, 6043, 6044, 6046, 6047, 6048, 6049, 6060]
      udp: [6044, 6045]
  # Set timezone here, not in taoscfg
  timezone: "UTC"
  resources:
  storage:
    className: ""
    dataSize: "10Gi"
    logSize: "1Gi"
  nodeSelectors:
    taosd:
  clusterDomainSuffix: ""
  taoscfg:
    CLUSTER: "0"
    TAOS_REPLICA: "1"

kafka:
  global:
    security:
      allowInsecureImages: true
  enabled: true
  fullnameOverride: kafka-stream
  image:
    repository: 'bitnamilegacy/kafka'
  extraConfigYaml:
    default.replication.factor: "1"
    offsets.topic.replication.factor: "1"
    transaction.state.log.replication.factor: "1"
    transaction.state.log.min.isr: "1"

  controller:
    replicaCount: 1
    resourcesPreset: "medium"
  listeners:
    client:
      name: CLIENT
      containerPort: 9092
      protocol: PLAINTEXT
    controller:
      name: CONTROLLER
      containerPort: 9093
      protocol: PLAINTEXT
    interbroker:
      name: INTERNAL
      containerPort: 9094
      protocol: PLAINTEXT
  advertisedListeners: >-
    CLIENT://kafka-stream:9092
    CONTROLLER://kafka-stream-controller-headless:9093,
    INTERNAL://kafka-stream-controller-headless:9094,
